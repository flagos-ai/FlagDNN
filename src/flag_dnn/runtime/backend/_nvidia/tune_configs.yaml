softmax:
  - gen: true
    param_map:
      META:
        BLOCK_SIZE: block_size
      num_warps: warps
      num_stages: stages
    block_size:
      - 256
      - 512
      - 1024
      - 2048
      - 4096      # 针对大词表新增的大块读取
      - 8192      # 极限显存吞吐块大小
    warps:
      - 4
      - 8
      - 16
      - 32
    stages:
      - 2
      - 3
      - 4         # 增加流水线深度，有助于掩盖大块访存延迟