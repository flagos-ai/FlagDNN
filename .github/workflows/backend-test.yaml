name: Backend Test

on:
  workflow_call:
    inputs:
      vendor:
        description: 'DNN_VENDOR value (e.g. nvidia, iluvatar)'
        required: true
        type: string
      runner_label:
        description: 'GitHub Actions runner label'
        required: true
        type: string
      gpu_check_script:
        description: 'Path to GPU check script (leave empty to skip)'
        required: false
        type: string
        default: ''
      test_script:
        description: 'Path to test script under tools/ (leave empty to use tools/run_op.sh)'
        required: false
        type: string
        default: ''
      changed_files:
        description: 'List of changed files in a PR'
        required: false
        type: string
        default: ''
      pr_id:
        description: 'ID of the PR'
        required: false
        type: string
        default: ''

jobs:
  test:
    runs-on: ${{ inputs.runner_label }}
    concurrency:
      group: >-
        op-test-${{ inputs.vendor }}-
        ${{ github.event.pull_request.number || github.ref }}
      cancel-in-progress: true
    steps:
      - id: checkout-attempt-1
        uses: actions/checkout@v4
        continue-on-error: true

      - id: sleep-1
        if: steps.checkout-attempt-1.outcome == 'failure'
        shell: bash
        run: sleep 30s

      - id: checkout-attempt-2
        if: steps.checkout-attempt-1.outcome == 'failure'
        uses: actions/checkout@v4
        continue-on-error: true

      - id: sleep-2
        if: steps.checkout-attempt-2.outcome == 'failure'
        shell: bash
        run: sleep 30s

      - id: checkout-attempt-3
        if: steps.checkout-attempt-2.outcome == 'failure'
        uses: actions/checkout@v4

      - name: Setup FlagDNN
        shell: bash
        env:
          RUNNER_LABEL: ${{ inputs.runner_label }}
        run: |
          source tools/set-env.sh ${{ inputs.vendor }}
          ./setup.sh ${{ inputs.vendor }}

      - name: Check GPU availability
        if: ${{ inputs.gpu_check_script != '' }}
        shell: bash
        run: |
          bash ${{ inputs.gpu_check_script }}

      - name: Run backend tests (custom script)
        if: ${{ inputs.test_script != '' }}
        env:
          CHANGED_FILES: ${{ inputs.changed_files }}
        shell: bash
        run: |
          source .venv/bin/activate
          source tools/set-env.sh ${{ inputs.vendor }}
          bash ${{ inputs.test_script }} ${{ inputs.vendor }} ${{ inputs.pr_id }}

      - name: Run backend tests
        if: ${{ inputs.test_script == '' }}
        shell: bash
        env:
          CHANGED_FILES: ${{ inputs.changed_files }}
        run: |
          source .venv/bin/activate
          source tools/set-env.sh ${{ inputs.vendor }}
          tools/run_op.sh ${{ inputs.pr_id }}
